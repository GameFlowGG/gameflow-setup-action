name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Move floating major tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update floating major tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          MAJOR="${TAG%%.*}"                # e.g. v1

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete the remote major tag if it already exists, then re-create it
          # pointing at the current commit (the one the new semver tag points to).
          git push origin ":refs/tags/${MAJOR}" || true
          git tag --force "${MAJOR}"
          git push origin "refs/tags/${MAJOR}"

          echo "Floating tag ${MAJOR} now points to ${TAG} (${GITHUB_SHA})"
